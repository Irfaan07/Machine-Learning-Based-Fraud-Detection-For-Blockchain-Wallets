<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Fraud Detection System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050912;
      --card: #0b1020;
      --accent: #4ade80;
      --accent-strong: #22c55e;
      --danger: #fb7185;
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --border: rgba(148, 163, 184, 0.2);
      --glow: 0 0 28px rgba(74, 222, 128, 0.35);
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top left, #1d283a 0, #020617 45%),
                  radial-gradient(circle at bottom right, rgba(56,189,248,0.08), transparent 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 0, #4ade80, #22c55e 45%, #0f172a 80%);
      box-shadow: 0 0 28px rgba(34,197,94,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #020617;
    }

    .logo-text {
      font-size: 14px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card {
      background: linear-gradient(135deg, #0b1020 0%, #0d1526 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 14px;
      text-align: center; font-size: 13px; font-weight: 500;
      color: var(--text-soft); cursor: pointer;
      transition: color 150ms, background 150ms;
      border: none; background: none; font-family: inherit;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      background: rgba(74,222,128,0.06);
    }

    .panel { display: none; padding: 28px 24px; }
    .panel.active { display: flex; flex-direction: column; gap: 16px; }

    label {
      display: flex; flex-direction: column; gap: 6px;
      font-size: 12px; color: var(--text-soft); letter-spacing: 0.04em;
    }

    input {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(30,64,175,0.5);
      background: rgba(15,23,42,0.9);
      color: var(--text); font-family: inherit; font-size: 13px;
      outline: none;
      transition: border-color 150ms, box-shadow 150ms;
    }
    input:focus {
      border-color: var(--accent-strong);
      box-shadow: var(--glow);
    }

    .btn {
      margin-top: 4px;
      padding: 11px 14px;
      border: none; border-radius: 999px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      box-shadow: 0 8px 32px rgba(34,197,94,0.4);
      transition: box-shadow 150ms, transform 90ms;
    }
    .btn:hover { box-shadow: 0 12px 40px rgba(34,197,94,0.55); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      font-size: 12px; color: var(--danger);
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px; padding: 8px 12px;
      display: none;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      font-size: 12px; color: var(--accent);
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 8px; padding: 8px 12px;
      display: none;
    }
    .success-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="logo-row">
      <div class="logo-mark">⛓</div>
      <span class="logo-text">Fraud Detection System</span>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Create Account</button>
      </div>

      <!-- LOGIN -->
      <div id="panel-login" class="panel active">
        <div class="error-msg" id="login-error"></div>
        <label>Email
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </label>
        <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
      </div>

      <!-- REGISTER -->
      <div id="panel-register" class="panel">
        <div class="error-msg" id="register-error"></div>
        <div class="success-msg" id="register-success"></div>
        <label>Username
          <input type="text" id="reg-username" placeholder="john_doe" autocomplete="username" />
        </label>
        <label>Email
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password" />
        </label>
        <button class="btn" id="register-btn" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add('visible');
    }
    function clearMsg(id) { document.getElementById(id).classList.remove('visible'); }

    async function doLogin() {
      clearMsg('login-error');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      if (!email || !password) { showError('login-error', 'Please fill in all fields.'); return; }

      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showError('login-error', data.detail || 'Login failed.'); return; }
        localStorage.setItem('jwt_token', data.access_token);
        window.location.href = 'dashboard.html';
      } catch (e) {
        showError('login-error', 'Cannot connect to server. Is the backend running?');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function doRegister() {
      clearMsg('register-error'); clearMsg('register-success');
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const btn = document.getElementById('register-btn');
      if (!username || !email || !password) { showError('register-error', 'Please fill in all fields.'); return; }
      if (password.length < 6) { showError('register-error', 'Password must be at least 6 characters.'); return; }

      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) { showError('register-error', data.detail || 'Registration failed.'); return; }
        const s = document.getElementById('register-success');
        s.textContent = `Account created for ${data.username}! You can now sign in.`;
        s.classList.add('visible');
        setTimeout(() => showTab('login'), 1500);
      } catch (e) {
        showError('register-error', 'Cannot connect to server. Is the backend running?');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    // If already logged in, go straight to dashboard
    if (localStorage.getItem('jwt_token')) {
      window.location.href = 'dashboard.html';
    }

    // Allow Enter key submission
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('panel-login').classList.contains('active');
      if (loginActive) doLogin(); else doRegister();
    });
  </script>
</body>
</html>
